naftiko: 1.0.0-alpha2
info:
  label: Ryder Carrier API — Documents
  description: 'Ryder Carrier API — Documents. 1 operations. Lead operation: Upload Document. Self-contained Naftiko capability
    covering one Ryder System business surface.'
  tags:
  - Ryder System
  - Documents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RYDER_SYSTEM_API_KEY: RYDER_SYSTEM_API_KEY
capability:
  consumes:
  - type: http
    namespace: ryder-carrier-documents
    baseUri: https://api.ryder.com/rcsc/events/v1
    description: Ryder Carrier API — Documents business capability. Self-contained, no shared references.
    resources:
    - name: documents
      path: /documents
      operations:
      - name: uploaddocument
        method: POST
        description: Upload Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Ocp-Apim-Subscription-Key
      value: '{{env.RYDER_SYSTEM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ryder-carrier-documents-rest
    port: 8080
    description: REST adapter for Ryder Carrier API — Documents. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/documents
      name: documents
      description: REST surface for documents.
      operations:
      - method: POST
        name: uploaddocument
        description: Upload Document
        call: ryder-carrier-documents.uploaddocument
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ryder-carrier-documents-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ryder Carrier API — Documents. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: upload-document
      description: Upload Document
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ryder-carrier-documents.uploaddocument
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
