naftiko: "1.0.0-alpha1"

info:
  label: "Ryder TM Shipment Management API"
  description: >-
    The Ryder TM Shipment Management API enables customers to manage shipments,
    loads, and tracking updates. Supports shipment creation, load management,
    ship confirmation, and real-time status tracking.
  tags:
    - Shipment Management
    - Supply Chain
    - Transportation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RYDER_TM_API_KEY: RYDER_TM_API_KEY
      RYDER_TM_CLIENT_ID: RYDER_TM_CLIENT_ID
      RYDER_TM_CLIENT_SECRET: RYDER_TM_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: ryder-tm
      baseUri: https://api.ryder.com/tmshipment/v1
      description: "Ryder TM Shipment Management API"
      authentication:
        type: apikey
        key: Ocp-Apim-Subscription-Key
        value: "{{RYDER_TM_API_KEY}}"
        placement: header
      resources:
        - name: shipments
          path: /shipments
          description: "Shipment management operations"
          operations:
            - name: list-shipments
              method: GET
              description: "Retrieve a list of shipments"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by shipment status"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date filter (YYYY-MM-DD)"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date filter (YYYY-MM-DD)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Page size"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-shipment
              method: POST
              description: "Submit shipment requirements to Ryder"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  origin: "{{tools.origin}}"
                  destination: "{{tools.destination}}"
                  requestedPickupDate: "{{tools.requestedPickupDate}}"
            - name: get-shipment
              method: GET
              description: "Retrieve details for a specific shipment"
              inputParameters:
                - name: shipmentId
                  in: path
                  type: string
                  required: true
                  description: "Shipment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-shipment
              method: PUT
              description: "Update shipment details or requirements"
              inputParameters:
                - name: shipmentId
                  in: path
                  type: string
                  required: true
                  description: "Shipment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  requestedPickupDate: "{{tools.requestedPickupDate}}"
                  specialInstructions: "{{tools.specialInstructions}}"
        - name: loads
          path: /loads
          description: "Load management within shipments"
          operations:
            - name: list-loads
              method: GET
              description: "Retrieve a list of loads"
              inputParameters:
                - name: shipmentId
                  in: query
                  type: string
                  required: false
                  description: "Filter by shipment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-load
              method: GET
              description: "Retrieve details for a specific load"
              inputParameters:
                - name: loadId
                  in: path
                  type: string
                  required: true
                  description: "Load identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: ship-confirmations
          path: /ship-confirmations
          description: "Ship confirmation operations"
          operations:
            - name: confirm-shipment
              method: POST
              description: "Submit a ship confirmation when goods are shipped"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  shipmentId: "{{tools.shipmentId}}"
                  actualShipDate: "{{tools.actualShipDate}}"
                  trackingNumber: "{{tools.trackingNumber}}"
        - name: ship-status
          path: /ship-status
          description: "Shipment status and tracking"
          operations:
            - name: get-shipment-status
              method: GET
              description: "Retrieve current status and tracking for a shipment"
              inputParameters:
                - name: shipmentId
                  in: path
                  type: string
                  required: true
                  description: "Shipment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: ryder-tm-api
      resources:
        - path: /v1/shipments
          name: shipments
          description: "Shipments"
          operations:
            - method: GET
              name: list-shipments
              description: "List shipments"
              call: "ryder-tm.list-shipments"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: ryder-tm-mcp
      transport: http
      tools:
        - name: list-shipments
          description: "List shipments managed by Ryder"
          hints:
            readOnly: true
            openWorld: true
          call: "ryder-tm.list-shipments"
          outputParameters:
            - type: object
              mapping: "$."
