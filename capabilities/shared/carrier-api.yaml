naftiko: "1.0.0-alpha1"

info:
  label: "Ryder Carrier API"
  description: >-
    The Ryder Carrier API enables carriers to push updates to Ryder for managing
    transportation, brokerage, and tracking services. Supports load tender management,
    event updates, location tracking, and document uploads.
  tags:
    - Carrier Management
    - Load Tracking
    - Supply Chain
    - Transportation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RYDER_CARRIER_API_KEY: RYDER_CARRIER_API_KEY

capability:
  consumes:
    - type: http
      namespace: ryder-carrier
      baseUri: https://api.ryder.com/rcsc/events/v1
      description: "Ryder Carrier API for load and transportation management"
      authentication:
        type: apikey
        key: Ocp-Apim-Subscription-Key
        value: "{{RYDER_CARRIER_API_KEY}}"
        placement: header
      resources:
        - name: loads
          path: /loads
          description: "Load tenders assigned to the carrier"
          operations:
            - name: list-loads
              method: GET
              description: "Retrieve a list of load tenders assigned to the carrier"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by load status"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Page size"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-load
              method: GET
              description: "Retrieve detailed information for a specific load tender"
              inputParameters:
                - name: loadId
                  in: path
                  type: string
                  required: true
                  description: "Load identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: accept-load
              method: POST
              description: "Accept a load tender from Ryder"
              inputParameters:
                - name: loadId
                  in: path
                  type: string
                  required: true
                  description: "Load identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  driver_id: "{{tools.driver_id}}"
                  vehicle_id: "{{tools.vehicle_id}}"
            - name: decline-load
              method: POST
              description: "Decline a load tender from Ryder"
              inputParameters:
                - name: loadId
                  in: path
                  type: string
                  required: true
                  description: "Load identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  reason: "{{tools.reason}}"
            - name: create-load-event
              method: POST
              description: "Submit an event update for a load"
              inputParameters:
                - name: loadId
                  in: path
                  type: string
                  required: true
                  description: "Load identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  event_type: "{{tools.event_type}}"
                  timestamp: "{{tools.timestamp}}"
                  notes: "{{tools.notes}}"
        - name: tracking
          path: /tracking
          description: "Vehicle and shipment location tracking"
          operations:
            - name: submit-location-update
              method: POST
              description: "Submit a real-time vehicle location update"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  load_id: "{{tools.load_id}}"
                  vehicle_id: "{{tools.vehicle_id}}"
                  latitude: "{{tools.latitude}}"
                  longitude: "{{tools.longitude}}"
                  timestamp: "{{tools.timestamp}}"
        - name: documents
          path: /documents
          description: "Document uploads to RyderShare"
          operations:
            - name: upload-document
              method: POST
              description: "Upload a document to the RyderShare platform"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: ryder-carrier-api
      resources:
        - path: /v1/loads
          name: loads
          description: "Load tenders"
          operations:
            - method: GET
              name: list-loads
              description: "List load tenders"
              call: "ryder-carrier.list-loads"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: ryder-carrier-mcp
      transport: http
      tools:
        - name: list-loads
          description: "List load tenders assigned to the carrier"
          hints:
            readOnly: true
            openWorld: true
          call: "ryder-carrier.list-loads"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-load
          description: "Get detailed information for a specific load"
          hints:
            readOnly: true
            openWorld: false
          call: "ryder-carrier.get-load"
          with:
            loadId: "tools.loadId"
          outputParameters:
            - type: object
              mapping: "$."
