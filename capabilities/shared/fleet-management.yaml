naftiko: "1.0.0-alpha1"

info:
  label: "Ryder Fleet Management API"
  description: >-
    The Ryder Fleet Management API provides access to fleet and location data
    for Ryder lease customers. Enables vehicle information retrieval, location
    data with service hours, historical maintenance records, and invoice management.
  tags:
    - Fleet Management
    - Invoices
    - Locations
    - Service History
    - Vehicles
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RYDER_FMS_API_KEY: RYDER_FMS_API_KEY

capability:
  consumes:
    - type: http
      namespace: ryder-fms
      baseUri: https://developer.ryder.com/fms/apis
      description: "Ryder Fleet Management System API"
      authentication:
        type: apikey
        key: Ocp-Apim-Subscription-Key
        value: "{{RYDER_FMS_API_KEY}}"
        placement: header
      resources:
        - name: fleet
          path: /fleet
          description: "Fleet vehicle information and specifications"
          operations:
            - name: list-fleet-vehicles
              method: GET
              description: "Retrieve a list of vehicles in the fleet"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number for pagination"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-vehicle
              method: GET
              description: "Retrieve detailed information about a specific vehicle"
              inputParameters:
                - name: vehicleId
                  in: path
                  type: string
                  required: true
                  description: "Vehicle identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: locations
          path: /locations
          description: "Ryder service location information"
          operations:
            - name: list-locations
              method: GET
              description: "Retrieve location information including address and services"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: service-history
          path: /fleet/{vehicleId}/service-history
          description: "Vehicle service history records"
          operations:
            - name: get-service-history
              method: GET
              description: "Retrieve historical maintenance records for a specific vehicle"
              inputParameters:
                - name: vehicleId
                  in: path
                  type: string
                  required: true
                  description: "Vehicle identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: invoices
          path: /invoices
          description: "Fleet invoice details and payment status"
          operations:
            - name: list-invoices
              method: GET
              description: "Retrieve historical invoice details for the fleet"
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date for invoice filter (YYYY-MM-DD)"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date for invoice filter (YYYY-MM-DD)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ryder-fms-api
      resources:
        - path: /v1/fleet
          name: fleet
          description: "Fleet vehicles"
          operations:
            - method: GET
              name: list-fleet-vehicles
              description: "List fleet vehicles"
              call: "ryder-fms.list-fleet-vehicles"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/locations
          name: locations
          description: "Service locations"
          operations:
            - method: GET
              name: list-locations
              description: "List Ryder service locations"
              call: "ryder-fms.list-locations"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ryder-fms-mcp
      transport: http
      tools:
        - name: list-fleet-vehicles
          description: "List fleet vehicles with specifications"
          hints:
            readOnly: true
            openWorld: true
          call: "ryder-fms.list-fleet-vehicles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vehicle
          description: "Get detailed vehicle information"
          hints:
            readOnly: true
            openWorld: false
          call: "ryder-fms.get-vehicle"
          with:
            vehicleId: "tools.vehicleId"
          outputParameters:
            - type: object
              mapping: "$."
