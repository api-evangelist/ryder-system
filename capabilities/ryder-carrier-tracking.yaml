naftiko: 1.0.0-alpha2
info:
  label: Ryder Carrier API — Tracking
  description: 'Ryder Carrier API — Tracking. 1 operations. Lead operation: Submit Location Update. Self-contained Naftiko
    capability covering one Ryder System business surface.'
  tags:
  - Ryder System
  - Tracking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RYDER_SYSTEM_API_KEY: RYDER_SYSTEM_API_KEY
capability:
  consumes:
  - type: http
    namespace: ryder-carrier-tracking
    baseUri: https://api.ryder.com/rcsc/events/v1
    description: Ryder Carrier API — Tracking business capability. Self-contained, no shared references.
    resources:
    - name: tracking
      path: /tracking
      operations:
      - name: submitlocationupdate
        method: POST
        description: Submit Location Update
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Ocp-Apim-Subscription-Key
      value: '{{env.RYDER_SYSTEM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ryder-carrier-tracking-rest
    port: 8080
    description: REST adapter for Ryder Carrier API — Tracking. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tracking
      name: tracking
      description: REST surface for tracking.
      operations:
      - method: POST
        name: submitlocationupdate
        description: Submit Location Update
        call: ryder-carrier-tracking.submitlocationupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ryder-carrier-tracking-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ryder Carrier API — Tracking. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: submit-location-update
      description: Submit Location Update
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ryder-carrier-tracking.submitlocationupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
