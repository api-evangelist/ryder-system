  - aid: ryder-system:tm-shipment-api
    name: Ryder TM Shipment Management API
    description: The Ryder TM Shipment Management API enables seamless integration for customers to manage shipments, loads,
      and tracking updates. It uses OAuth 2.0 Client Credentials flow via Okta combined with an API subscription key. Supports
      Shipment, Load, Ship Confirmation, Ship Status, and Event Notifications.
    humanURL: https://developer.ryder.com/scs/docs/tm-shipment-management/overview
