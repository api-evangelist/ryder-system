apis:
  - aid: ryder-system:fleet-management-api
    name: Ryder Fleet Management API
    description: The Ryder Fleet Management API (FMS) enables seamless integration of fleet and location data into business
      systems. It provides access to Ryder fleet details including vehicle information and specifications, location data with
      address and service hours, historical maintenance records, and invoice details with line items and payment status. Requires
      API key authentication via the Ocp-Apim-Subscription-Key header.
    humanURL: https://developer.ryder.com/fms/overview
    baseURL: https://developer.ryder.com/fms/apis
    tags:
    - Fleet Management
    - Invoices
    - Locations
    - Service History
    - Vehicles
