  - aid: ryder-system:carrier-api
    name: Ryder Carrier API
    description: The Ryder Carrier API enables carriers to push updates to Ryder for managing transportation, brokerage, and
      tracking services. It supports resource assignment and tracking for load tenders, event updates for load events and milestones,
      vehicle locations, and document uploads to the RyderShare platform.
    humanURL: https://developer.ryder.com/scs/docs/scs-carrier/overview
    baseURL: https://api.ryder.com/rcsc/events/v1
    tags:
