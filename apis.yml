aid: ryder-system
name: Ryder System
description: Ryder System, Inc. is a leading provider of supply chain, dedicated transportation, and fleet management solutions.
  Ryder operates a developer portal offering REST APIs for fleet management and supply chain operations, enabling customers
  to integrate Ryder services into their business systems. The Fleet Management APIs support customers who lease, rent, and
  maintain vehicles, while the Supply Chain Solutions APIs support carrier management, load tracking, shipment management,
  and last-mile delivery operations.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
